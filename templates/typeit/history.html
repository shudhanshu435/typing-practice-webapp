<!DOCTYPE html>
<html>

<head>

<title>Typing History</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f5f7fa;
}

</style>

</head>

<body>

<!-- ✅ NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand" href="/">
Typing Practice
</a>

<div>

<a class="btn btn-light me-2" href="/">
Typing
</a>

<a class="btn btn-light me-2" href="/dashboard/">
Dashboard
</a>

<a class="btn btn-light me-2" href="/profile/">
Profile
</a>

<a class="btn btn-light me-2" href="/leaderboard/">
Leaderboard
</a>

<a class="btn btn-danger" href="{% url 'logout' %}">
Logout
</a>

</div>

</div>

</nav>


<div class="container mt-4">

<h2 class="text-center mb-4">

📋 Typing Test History

</h2>


<!-- History Table -->

<div class="card shadow-sm p-4">

<div class="table-responsive">

<table class="table table-striped table-bordered text-center">

<thead class="table-primary">

<tr>

<th>Date</th>

<th>Duration</th>

<th>WPM</th>

<th>Accuracy (%)</th>

<th>Errors</th>

</tr>

</thead>

<tbody>

{% for record in records %}

<tr>

<td>

{{ record.created_at }}

</td>

<td>

{{ record.duration }} sec

</td>

<td>

{{ record.wpm }}

</td>

<td>

{{ record.accuracy }}

</td>

<td>

{{ record.errors }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
