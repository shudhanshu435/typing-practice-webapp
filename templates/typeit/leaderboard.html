<!DOCTYPE html>
<html>

<head>

<title>Leaderboard</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f5f7fa;
}

.rank-1 {
    background-color: #ffd70033; /* Gold */
}

.rank-2 {
    background-color: #c0c0c033; /* Silver */
}

.rank-3 {
    background-color: #cd7f3233; /* Bronze */
}

</style>

</head>

<body>

<!-- ✅ NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand" href="/">
Typing Practice
</a>

<div>

<a class="btn btn-light me-2" href="/">
Typing
</a>

<a class="btn btn-light me-2" href="/dashboard/">
Dashboard
</a>

<a class="btn btn-light me-2" href="/profile/">
Profile
</a>

<a class="btn btn-light me-2" href="/history/">
History
</a>

<a class="btn btn-danger" href="/logout/">
Logout
</a>

</div>

</div>

</nav>


<div class="container mt-4">

<h2 class="text-center mb-4">

🏆 Leaderboard

</h2>


<div class="card shadow-sm p-4">

<div class="table-responsive">

<table class="table table-bordered text-center">

<thead class="table-primary">

<tr>

<th>Rank</th>

<th>Name</th>

<th>Best WPM</th>

</tr>

</thead>

<tbody>

{% for user in leaderboard %}

<tr
{% if forloop.counter == 1 %}
class="rank-1"
{% elif forloop.counter == 2 %}
class="rank-2"
{% elif forloop.counter == 3 %}
class="rank-3"
{% endif %}
>

<td>

🏅 {{ forloop.counter }}

</td>

<td>

{{ user.full_name }}

</td>

<td>

<strong>

{{ user.best_wpm }}

</strong>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>


</div>

</body>

</html>
