<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Register</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f5f7fa;
}

.register-card {
    max-width: 450px;
    margin: auto;
    margin-top: 60px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow register-card p-4">

<h3 class="text-center mb-4">

📝 Create Account

</h3>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<div class="d-grid">

<button
type="submit"
class="btn btn-primary">

Register

</button>

</div>

</form>

<p class="text-center mt-3">

Already have an account?

<a href="{% url 'login' %}">

Login here

</a>

</p>

</div>

</div>

</body>

</html>
