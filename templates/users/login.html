<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Login</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background-color: #f5f7fa;
}

.login-card {
    max-width: 400px;
    margin: auto;
    margin-top: 100px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow login-card p-4">

<h3 class="text-center mb-4">

🔐 Login

</h3>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<div class="d-grid">

<button
type="submit"
class="btn btn-primary">

Login

</button>

</div>

</form>

<p class="text-center mt-3">

Don't have an account?

<a href="{% url 'register' %}">

Register here

</a>

</p>

</div>

</div>

</body>

</html>
